<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的足迹</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        his: { primary: '#4F9EFD', light: '#E8F0FF', dark: '#2C5282' },
                        her: { primary: '#FF75A0', light: '#FFEFF3', dark: '#A64AC9' }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        dancing: ['"Dancing Script"', 'cursive']
                    }
                }
            }
        }
    </script>
    <style>
        #map-container { width: 100%; height: calc(100vh - 120px); z-index: 1; }
        .location-form-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .location-form-card {
            background: white; border-radius: 16px; padding: 24px;
            width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .pick-banner {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(0,0,0,0.75); color: white;
            padding: 10px 24px; border-radius: 24px; font-size: 14px;
            backdrop-filter: blur(8px); display: flex; align-items: center; gap: 12px;
        }
        .leaflet-container { cursor: grab; }
        .picking .leaflet-container { cursor: crosshair !important; }
    </style>
</head>
<body class="font-inter text-gray-800 min-h-screen bg-gray-50">
    <nav class="fixed top-0 left-0 right-0 z-40 transition-all duration-300">
        <div class="bg-white/70 backdrop-blur-xl border-b border-white/40 shadow-sm">
            <div class="container mx-auto px-4 py-3 flex justify-center items-center">
                <ul class="flex flex-wrap justify-center gap-x-5 gap-y-2 text-sm">
                    <li><a href="/" class="nav-link py-2 px-1">首页</a></li>
                    <li><a href="/timeline" class="nav-link py-2 px-1">时间线</a></li>
                    <li><a href="#" class="nav-link py-2 px-1 text-primary border-b-2 border-primary">足迹</a></li>
                    <li><a href="/calendar" class="nav-link py-2 px-1">日历</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="pt-16 pb-16 px-0">
        <div class="container mx-auto px-4 mb-4 flex flex-col md:flex-row justify-between items-center">
            <h2 class="text-[clamp(1.8rem,4vw,2.5rem)] font-dancing text-primary mb-2 md:mb-0">我们的足迹</h2>
            <div id="stats" class="text-sm text-gray-500"></div>
        </div>
        <div id="map-container"></div>
    </main>

    <button id="add-btn"
        class="fixed bottom-8 right-8 w-14 h-14 rounded-full shadow-lg text-white flex items-center justify-center text-2xl z-[999] transition-all hover:scale-110 active:scale-95"
        style="background: linear-gradient(135deg, #4F9EFD, #FF75A0);">
        <i class="fa fa-plus"></i>
    </button>

    <script>
    let currentUser = null;
    let map = null;
    let markers = [];
    let locations = [];
    let pickingMode = false;
    let pickMarker = null;

    const HIS_COLOR = '#4F9EFD';
    const HER_COLOR = '#FF75A0';

    document.addEventListener('DOMContentLoaded', async () => {
        // 认证
        try {
            const res = await fetch('/api/auth/me', { credentials: 'include' });
            if (res.ok) {
                const data = await res.json();
                currentUser = data.user.username;
            }
        } catch(e) {}
        if (!currentUser) {
            const params = new URLSearchParams(window.location.search);
            currentUser = params.get('user') || 'his';
        }
        initUserInterface();
        initMap();
        await loadLocations();
        renderMarkers();
        updateStats();
        document.getElementById('add-btn').addEventListener('click', enterPickingMode);
    });

    function initUserInterface() {
        document.documentElement.style.setProperty('--primary-color', currentUser === 'his' ? HIS_COLOR : HER_COLOR);
    }

    function initMap() {
        map = L.map('map-container').setView([34.2, 108.9], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);
    }

    function createIcon(color) {
        return L.divIcon({
            className: '',
            html: '<div style="width:24px;height:24px;background:' + color + ';border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3);"></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12],
            popupAnchor: [0, -16]
        });
    }

    async function loadLocations() {
        try {
            const res = await fetch('/api/locations', { credentials: 'include' });
            const data = await res.json();
            if (data.success) locations = data.data;
        } catch (err) {
            console.error('加载足迹失败:', err);
        }
    }

    function renderMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        var bounds = [];

        locations.forEach(function(loc) {
            var color = loc.author === 'his' ? HIS_COLOR : HER_COLOR;
            var authorLabel = loc.author === 'his' ? '他' : '她';
            var dateStr = loc.visited_at ? loc.visited_at.slice(0, 10) : '';

            var popupHtml = '<div style="font-family:Inter,sans-serif;min-width:180px;">' +
                '<div style="font-size:15px;font-weight:600;margin-bottom:4px;">' + escapeHtml(loc.name) + '</div>' +
                '<div style="font-size:13px;color:#6b7280;margin-bottom:8px;">' +
                    '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';margin-right:6px;"></span>' +
                    authorLabel + (dateStr ? ' · ' + dateStr : '') +
                '</div>' +
                '<div style="display:flex;gap:8px;justify-content:flex-end;">' +
                    '<button onclick="editLocation(' + loc.id + ')" style="font-size:12px;color:#4F9EFD;background:none;border:none;cursor:pointer;">编辑</button>' +
                    '<button onclick="deleteLocation(' + loc.id + ')" style="font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;">删除</button>' +
                '</div></div>';

            var marker = L.marker([loc.lat, loc.lng], { icon: createIcon(color) })
                .bindPopup(popupHtml)
                .addTo(map);
            markers.push(marker);
            bounds.push([loc.lat, loc.lng]);
        });

        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [50, 50] });
        }
    }

    // 选点模式
    function enterPickingMode() {
        if (pickingMode) return;
        pickingMode = true;
        document.body.classList.add('picking');

        var banner = document.createElement('div');
        banner.id = 'pick-banner';
        banner.className = 'pick-banner';
        banner.innerHTML = '<i class="fa fa-map-marker"></i> 点击地图选择位置 ' +
            '<button onclick="exitPickingMode()" style="background:rgba(255,255,255,0.2);border:none;color:white;padding:4px 12px;border-radius:12px;cursor:pointer;">取消</button>';
        document.body.appendChild(banner);

        map.once('click', onMapClick);
    }

    function exitPickingMode() {
        pickingMode = false;
        document.body.classList.remove('picking');
        var banner = document.getElementById('pick-banner');
        if (banner) banner.remove();
        map.off('click', onMapClick);
        if (pickMarker) { map.removeLayer(pickMarker); pickMarker = null; }
    }

    function onMapClick(e) {
        var latlng = e.latlng;
        if (pickMarker) map.removeLayer(pickMarker);
        pickMarker = L.marker([latlng.lat, latlng.lng], {
            icon: createIcon(currentUser === 'his' ? HIS_COLOR : HER_COLOR)
        }).addTo(map);

        exitPickingMode();
        showAddForm(latlng.lng, latlng.lat);
    }

    function showAddForm(lng, lat) {
        var overlay = document.createElement('div');
        overlay.className = 'location-form-overlay';
        overlay.innerHTML =
            '<div class="location-form-card">' +
                '<h3 class="text-lg font-semibold mb-4"><i class="fa fa-map-marker text-primary mr-2"></i>添加新足迹</h3>' +
                '<div class="mb-4">' +
                    '<label class="block text-sm font-medium text-gray-700 mb-1">地点名称 <span class="text-red-400">*</span></label>' +
                    '<input type="text" id="loc-name" placeholder="例如：西湖" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 transition" />' +
                '</div>' +
                '<div class="mb-4">' +
                    '<label class="block text-sm font-medium text-gray-700 mb-1">到访日期</label>' +
                    '<input type="date" id="loc-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg transition" />' +
                '</div>' +
                '<div class="mb-4 text-xs text-gray-400">坐标：' + lng.toFixed(4) + ', ' + lat.toFixed(4) + '</div>' +
                '<div class="flex justify-end gap-3">' +
                    '<button id="form-cancel" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">取消</button>' +
                    '<button id="form-save" class="px-6 py-2 text-white rounded-lg hover:opacity-90 transition" style="background:var(--primary-color,#4F9EFD);">保存</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(overlay);

        document.getElementById('loc-date').value = new Date().toISOString().slice(0, 10);

        document.getElementById('form-cancel').addEventListener('click', function() {
            overlay.remove();
            if (pickMarker) { map.removeLayer(pickMarker); pickMarker = null; }
        });
        document.getElementById('form-save').addEventListener('click', async function() {
            var name = document.getElementById('loc-name').value.trim();
            if (!name) { document.getElementById('loc-name').style.borderColor = '#ef4444'; return; }
            await saveLocation({ name: name, lat: lat, lng: lng, visited_at: document.getElementById('loc-date').value || null });
            overlay.remove();
            if (pickMarker) { map.removeLayer(pickMarker); pickMarker = null; }
        });
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) { overlay.remove(); if (pickMarker) { map.removeLayer(pickMarker); pickMarker = null; } }
        });
        setTimeout(function() { document.getElementById('loc-name').focus(); }, 100);
    }

    function editLocation(id) {
        var loc = locations.find(function(l) { return l.id === id; });
        if (!loc) return;
        map.closePopup();

        var overlay = document.createElement('div');
        overlay.className = 'location-form-overlay';
        overlay.innerHTML =
            '<div class="location-form-card">' +
                '<h3 class="text-lg font-semibold mb-4"><i class="fa fa-pencil text-primary mr-2"></i>编辑足迹</h3>' +
                '<div class="mb-4">' +
                    '<label class="block text-sm font-medium text-gray-700 mb-1">地点名称</label>' +
                    '<input type="text" id="edit-name" value="' + escapeHtml(loc.name) + '" class="w-full px-4 py-2 border rounded-lg transition" />' +
                '</div>' +
                '<div class="mb-4">' +
                    '<label class="block text-sm font-medium text-gray-700 mb-1">到访日期</label>' +
                    '<input type="date" id="edit-date" value="' + (loc.visited_at || '').slice(0, 10) + '" class="w-full px-4 py-2 border rounded-lg transition" />' +
                '</div>' +
                '<div class="flex justify-end gap-3">' +
                    '<button id="edit-cancel" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">取消</button>' +
                    '<button id="edit-save" class="px-6 py-2 text-white rounded-lg" style="background:var(--primary-color,#4F9EFD);">保存</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(overlay);

        document.getElementById('edit-cancel').addEventListener('click', function() { overlay.remove(); });
        document.getElementById('edit-save').addEventListener('click', async function() {
            var name = document.getElementById('edit-name').value.trim();
            if (!name) return;
            await fetch('/api/locations/' + id, {
                method: 'PUT', credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, visited_at: document.getElementById('edit-date').value || null })
            });
            await loadLocations(); renderMarkers(); updateStats();
            overlay.remove();
        });
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    }

    async function deleteLocation(id) {
        if (!confirm('确定要删除这个足迹吗？')) return;
        map.closePopup();
        await fetch('/api/locations/' + id, { method: 'DELETE', credentials: 'include' });
        await loadLocations(); renderMarkers(); updateStats();
    }

    async function saveLocation(payload) {
        await fetch('/api/locations', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        await loadLocations(); renderMarkers(); updateStats();
    }

    function updateStats() {
        var total = locations.length;
        var hisCount = locations.filter(function(l) { return l.author === 'his'; }).length;
        var herCount = locations.filter(function(l) { return l.author === 'her'; }).length;
        document.getElementById('stats').innerHTML =
            '一起去过 <span class="font-semibold text-primary">' + total + '</span> 个地方' +
            '<span class="mx-2 text-gray-300">|</span>' +
            '<span style="color:' + HIS_COLOR + '">他 ' + hisCount + '</span>' +
            '<span class="mx-1 text-gray-300">/</span>' +
            '<span style="color:' + HER_COLOR + '">她 ' + herCount + '</span>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    </script>
</body>
</html>
